# CI — Validates builds on PRs and pushes to develop, and submits the dependency
# graph to GitHub for Dependabot vulnerability alerts.
#
# This workflow does not publish artifacts. For snapshot and release publishing,
# see Deploy Snapshot and Deploy Release.

name: CI

on:
    push:
        branches: [ "develop" ]
    pull_request:
        branches: [ "develop" ]

jobs:
    # Matrix build: compile on JDK 25 (our toolchain), then also run the build/tests on JDK 17
    # to guard the "hoist-core's published JAR runs on any JDK 17+" contract. Accidental use of
    # Java 18+ APIs fails the 17 row.
    build:

        runs-on: ubuntu-latest
        permissions:
            contents: read

        strategy:
            matrix:
                java: [ '17', '25' ]

        steps:
        - uses: actions/checkout@v6
        - name: Setup JDK ${{ matrix.java }}
          uses: actions/setup-java@v5
          with:
              java-version: ${{ matrix.java }}
              distribution: 'zulu'

        - name: Setup Gradle
          uses: gradle/actions/setup-gradle@v6
          with:
              build-scan-publish: false
              build-scan-terms-of-use-url: 'https://gradle.com/terms-of-service'
              build-scan-terms-of-use-agree: 'yes'

        - name: Build with Gradle Wrapper
          run: ./gradlew build

    dependency-submission:

        runs-on: ubuntu-latest
        permissions:
            contents: write

        steps:
        - uses: actions/checkout@v6
        - name: Setup JDK 25
          uses: actions/setup-java@v5
          with:
              java-version: '25'
              distribution: 'zulu'

        # Generates and submits a dependency graph, enabling Dependabot Alerts for all project dependencies.
        # See: https://github.com/gradle/actions/blob/main/dependency-submission/README.md
        - name: Generate and submit dependency graph
          uses: gradle/actions/dependency-submission@v6
          with:
              build-scan-publish: false
              build-scan-terms-of-use-url: 'https://gradle.com/terms-of-service'
              build-scan-terms-of-use-agree: 'yes'
