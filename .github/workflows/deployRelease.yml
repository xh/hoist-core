name: Deploy Release

on:
    release:
        types: [published]

jobs:
    build:

        runs-on: ubuntu-latest
        permissions:
            contents: read

        steps:
        - uses: actions/checkout@v6
        - name: Set up JDK 17
          uses: actions/setup-java@v5
          with:
              java-version: '17'
              distribution: 'zulu'

        - name: Setup Gradle
          uses: gradle/actions/setup-gradle@v5

        - name: Fix rootProject.name
          run: echo "rootProject.name = '%projectName%'" > settings.gradle

        - name: Build and publish release to Sonatype
          env:
              SONATYPE_USERNAME: ${{ secrets.SONATYPE_USERNAME }}
              SONATYPE_PASSWORD: ${{ secrets.SONATYPE_PASSWORD }}
              SIGNING_KEY_ID: ${{secrets.SIGNING_KEY_ID}}
              SIGNING_PASSWORD: ${{secrets.SIGNING_PASSWORD}}
              SECRING_FILE: ${{ secrets.SECRING_FILE }}
          run: |
              echo $SECRING_FILE | base64 -d > secring.gpg
              (set -x; ./gradlew -Psigning.secretKeyRingFile="${GITHUB_WORKSPACE}/secring.gpg" publishToSonatype closeSonatypeStagingRepository --no-daemon)