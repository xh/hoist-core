name: Deploy Release

on:
    workflow_dispatch:
        inputs:
            xhReleaseVersion:
                description: 'Release Version'
                required: true
                type: string

jobs:
    build:

        runs-on: ubuntu-latest
        permissions:
            contents: read

        steps:
        - uses: actions/checkout@v6
        - name: Set up JDK 17
          uses: actions/setup-java@v5
          with:
              java-version: '17'
              distribution: 'zulu'

        - name: Setup Gradle
          uses: gradle/actions/setup-gradle@v5

        - name: Build and publish release to Sonatype
          env:
              SONATYPE_USERNAME: ${{ secrets.SONATYPE_USERNAME }}
              SONATYPE_PASSWORD: ${{ secrets.SONATYPE_PASSWORD }}
              SIGNING_KEY: ${{ secrets.SIGNING_KEY }}
              SIGNING_PASSWORD: ${{ secrets.SIGNING_PASSWORD }}
              XH_RELEASE_VERSION: ${{ inputs.xhReleaseVersion }}
          run: |
              (set -x; ./gradlew -PxhReleaseVersion="$XH_RELEASE_VERSION" publishToSonatype closeAndReleaseSonatypeStagingRepository --no-daemon)
