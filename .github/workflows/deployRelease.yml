# Deploy Release — Builds, signs, and publishes a numbered release to Maven Central.
#
# Manually triggered from the main branch. Validates the version input, publishes via
# Sonatype's staging API, tags the commit, and creates a GitHub release with auto-generated
# notes. For snapshot builds, see Deploy Snapshot.

name: Deploy Release

on:
    workflow_dispatch:
        inputs:
            xhReleaseVersion:
                description: 'Release Version'
                required: true
                type: string

jobs:
    build:
        # Controls which branch(es) can trigger a release. Add branches here if a
        # release from a non-main branch is ever needed (e.g. a hotfix branch).
        if: github.ref == 'refs/heads/main'

        runs-on: ubuntu-latest
        permissions:
            contents: write

        steps:
        - uses: actions/checkout@v6
          with:
              fetch-tags: true

        - name: Validate release version and detect hotfix
          id: validate
          run: |
              VERSION="${{ inputs.xhReleaseVersion }}"
              IS_HOTFIX=false

              # Must be semver (X.Y.Z)
              if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
                  echo "::error::Invalid version '$VERSION'. Must be semver (e.g. 37.0.0)."
                  exit 1
              fi

              # Must not duplicate an existing release
              if git tag -l "v$VERSION" | grep -q .; then
                  echo "::error::Tag v$VERSION already exists. This version has already been released."
                  exit 1
              fi

              # Sanity check against the latest existing tag. This catches fat-finger
              # errors (e.g. 38.40.0 instead of 38.4.0) while allowing legitimate
              # hotfix releases on older branches.
              #
              # To release a hotfix for an older major version, run this workflow from
              # a maintenance branch after adjusting the branch guard above.
              LATEST=$(git tag -l 'v*' --sort=-version:refname | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | head -1 | sed 's/^v//')
              if [ -n "$LATEST" ]; then
                  NEW_MAJOR=$(echo "$VERSION" | cut -d. -f1)
                  NEW_MINOR=$(echo "$VERSION" | cut -d. -f2)
                  LATEST_MAJOR=$(echo "$LATEST" | cut -d. -f1)
                  LATEST_MINOR=$(echo "$LATEST" | cut -d. -f2)

                  if [ "$NEW_MAJOR" -gt "$LATEST_MAJOR" ]; then
                      JUMP=$((NEW_MAJOR - LATEST_MAJOR))
                      if [ "$JUMP" -gt 1 ]; then
                          echo "::error::Major version jumps by $JUMP (latest is v$LATEST). Verify this is intentional."
                          exit 1
                      fi
                  fi

                  if [ "$NEW_MAJOR" -eq "$LATEST_MAJOR" ] && [ "$NEW_MINOR" -gt "$LATEST_MINOR" ]; then
                      JUMP=$((NEW_MINOR - LATEST_MINOR))
                      if [ "$JUMP" -gt 20 ]; then
                          echo "::error::Minor version jumps by $JUMP (latest is v$LATEST). This looks like a typo."
                          exit 1
                      fi
                  fi

                  if [ "$NEW_MAJOR" -lt "$LATEST_MAJOR" ]; then
                      echo "::notice::Releasing $VERSION behind latest v$LATEST — assuming hotfix."
                      IS_HOTFIX=true
                  fi
              fi

              echo "is_hotfix=$IS_HOTFIX" >> "$GITHUB_OUTPUT"

        - name: Set up JDK 17
          uses: actions/setup-java@v5
          with:
              java-version: '17'
              distribution: 'zulu'

        - name: Setup Gradle
          uses: gradle/actions/setup-gradle@v5

        - name: Build and publish release to Sonatype
          env:
              SONATYPE_USERNAME: ${{ secrets.SONATYPE_USERNAME }}
              SONATYPE_PASSWORD: ${{ secrets.SONATYPE_PASSWORD }}
              SIGNING_KEY: ${{ secrets.SIGNING_KEY }}
              SIGNING_PASSWORD: ${{ secrets.SIGNING_PASSWORD }}
              XH_RELEASE_VERSION: ${{ inputs.xhReleaseVersion }}
          run: |
              (set -x; ./gradlew -PxhReleaseVersion="$XH_RELEASE_VERSION" publishToSonatype closeAndReleaseSonatypeStagingRepository --no-daemon)

        - name: Tag release
          run: |
              git tag "v${{ inputs.xhReleaseVersion }}"
              git push origin "v${{ inputs.xhReleaseVersion }}"

        - name: Create GitHub release
          env:
              GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          run: |
              LATEST_FLAG="--latest"
              if [ "${{ steps.validate.outputs.is_hotfix }}" = "true" ]; then
                  LATEST_FLAG="--latest=false"
              fi
              gh release create "v${{ inputs.xhReleaseVersion }}" \
                  --title "v${{ inputs.xhReleaseVersion }}" \
                  --generate-notes \
                  $LATEST_FLAG
