# Deploy Snapshot — Publishes a SNAPSHOT build to Sonatype on every push to develop.
#
# Snapshots are mutable development builds (version from gradle.properties, e.g. 37.0-SNAPSHOT).
# They are not signed, not tagged, and not promoted to Maven Central. For numbered releases,
# see Deploy Release.

name: Deploy Snapshot

on:
    push:
        branches: [ "develop" ]
    workflow_dispatch:
        inputs:
            version:
                description: '(Optional) Snapshot version to override default in gradle.properties. Note that the suffix "-SNAPSHOT" will be automatically appended if not present.'
                required: false
                default: ''
                type: string

# Debounce builds by branch. Newer runs from a branch will cancel the current run and start over.
concurrency:
    group: deploy-snapshot-${{ github.ref }}
    cancel-in-progress: true

jobs:
    build:

        runs-on: ubuntu-latest
        permissions:
            contents: read

        steps:
        - uses: actions/checkout@v6

        - name: Setup JDK 17
          uses: actions/setup-java@v5
          with:
              java-version: '17'
              distribution: 'zulu'

            # Setup Gradle. Submit informational build scans to https://scans.gradle.com/
            # and accept license terms to avoid big banner about the same added in v6 of this action.
        - name: Setup Gradle
          uses: gradle/actions/setup-gradle@v6
          with:
              build-scan-publish: true
              build-scan-terms-of-use-url: 'https://gradle.com/terms-of-service'
              build-scan-terms-of-use-agree: 'yes'

        - name: Prepare snapshot version
          uses: xh/hoist-dev-utils/.github/actions/prepare-gradle-snapshot-version@master
          with:
              version: ${{ inputs.version }}
              version-prop: xhReleaseVersion

        - name: Build and publish snapshot to Sonatype
          env:
              SONATYPE_USERNAME: ${{ secrets.SONATYPE_USERNAME }}
              SONATYPE_PASSWORD: ${{ secrets.SONATYPE_PASSWORD }}
          run: |
              (set -x; ./gradlew publishToSonatype --no-daemon)

        - name: Trigger Toolbox snapshot build
          env:
              GH_TOKEN: ${{ secrets.TOOLBOX_DISPATCH_TOKEN }}
          run: |
              gh api repos/xh/toolbox/dispatches \
                  -f event_type=hoist-core-snapshot
