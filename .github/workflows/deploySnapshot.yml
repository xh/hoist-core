# Deploy Snapshot — Publishes a SNAPSHOT build to Sonatype on every push to develop.
#
# Snapshots are mutable development builds (version from gradle.properties, e.g. 37.0-SNAPSHOT).
# They are not signed, not tagged, and not promoted to Maven Central. For numbered releases,
# see Deploy Release.

name: Deploy Snapshot

on:
    push:
        branches: [ "develop" ]
    workflow_dispatch:
        inputs:
            version:
                description: '(Optional) Snapshot version to override default in gradle.properties. Note that the suffix "-SNAPSHOT" will be automatically appended if not present.'
                required: false
                default: ''
                type: string

concurrency:
    group: deploy-snapshot
    cancel-in-progress: true

jobs:
    build:

        runs-on: ubuntu-latest
        permissions:
            contents: read

        steps:
        - uses: actions/checkout@v6

        - name: Setup JDK 17
          uses: actions/setup-java@v5
          with:
              java-version: '17'
              distribution: 'zulu'
              cache: 'gradle'

        - name: Setup Gradle
          uses: gradle/actions/setup-gradle@v5

        - name: Override snapshot version in gradle.properties
          if: inputs.version != ''
          env:
              VERSION: ${{ inputs.version }}
          run: |
              if [[ ! "$VERSION" == *-SNAPSHOT ]]; then
                VERSION="$VERSION-SNAPSHOT"
              fi
              sed -i "s/^xhReleaseVersion=.*/xhReleaseVersion=$VERSION/" gradle.properties
              echo "Updated xhReleaseVersion to SNAPSHOT version: $VERSION"

        - name: Read current version from gradle.properties
          id: current-version
          run: echo "current-version=$(grep '^xhReleaseVersion=' gradle.properties | cut -d'=' -f2)" >> "$GITHUB_OUTPUT"

        - name: Validate snapshot version
          uses: xh/hoist-dev-utils/.github/actions/set-validate-snapshot-version@develop
          with:
              version: ${{ steps.current-version.outputs.current-version }}
              append-timestamp: false

        - name: Build and publish snapshot to Sonatype
          env:
              SONATYPE_USERNAME: ${{ secrets.SONATYPE_USERNAME }}
              SONATYPE_PASSWORD: ${{ secrets.SONATYPE_PASSWORD }}
          run: |
              (set -x; ./gradlew publishToSonatype --no-daemon)

        - name: Trigger Toolbox snapshot build
          env:
              GH_TOKEN: ${{ secrets.TOOLBOX_DISPATCH_TOKEN }}
          run: |
              gh api repos/xh/toolbox/dispatches \
                  -f event_type=hoist-core-snapshot