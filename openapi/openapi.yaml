openapi: 3.0.3
info:
  title: Hoist Core API
  description: |
    Comprehensive API specification for hoist-core — the server-side Grails plugin component
    of the Hoist web application development toolkit by Extremely Heavy Industries (xh.io).

    ## Authentication
    All endpoints require authentication unless noted as **whitelisted** (pre-auth).
    Authentication is handled by `HoistFilter` via `BaseAuthenticationService.allowRequest()`.
    Whitelisted endpoints: `/ping`, `/xh/ping`, `/xh/version`, `/xh/authConfig`, `/xh/login`, `/xh/logout`.

    ## Authorization
    Endpoints are secured via role annotations. Common roles:
    - `HOIST_ADMIN` — Full admin access (read + write)
    - `HOIST_ADMIN_READER` — Read-only admin access
    - `HOIST_ROLE_MANAGER` — Role management access
    - `HOIST_IMPERSONATOR` — Impersonation access

    ## URL Routing
    - Standard endpoints: `/{controller}/{action}`
    - REST CRUD endpoints: `/rest/{controller}` with HTTP method dispatch
    - Proxy endpoints: `/proxy/{name}/{url}`

    ## Response Conventions
    - Success responses return JSON via Hoist's Jackson-based `JSONSerializer`
    - Empty success responses return HTTP 204 No Content
    - Error responses return `{name, message, cause?, isRoutine?}` with appropriate HTTP status
    - REST read responses wrap data in `{data: [...]}`
    - REST create/update responses wrap data in `{data: {...}}`
    - Cluster-delegated responses wrap results from specific instances
  version: 36.x
  contact:
    name: Extremely Heavy Industries
    url: https://xh.io
    email: info@xh.io
  license:
    name: Apache 2.0
    url: https://www.apache.org/licenses/LICENSE-2.0

servers:
  - url: /
    description: Application context root

tags:
  # Core client-facing endpoints
  - name: Auth
    description: Authentication, identity, and impersonation (XhController)
  - name: Config
    description: Client-visible application configuration (XhController)
  - name: Preferences
    description: User preference management (XhController)
  - name: JSON Blobs
    description: Generic JSON storage for ViewManager and client state (XhController)
  - name: Views
    description: ViewManager state and saved views (XhViewController)
  - name: Tracking
    description: Client activity and usage tracking (XhController)
  - name: Environment
    description: Application environment and health checks (XhController)
  - name: Export
    description: Grid data export (XhController)
  - name: Proxy
    description: API proxy pass-through (ProxyImplController)

  # Admin REST CRUD endpoints
  - name: 'Admin: App Config'
    description: CRUD management of AppConfig records (ConfigAdminController)
  - name: 'Admin: Preferences'
    description: CRUD management of Preference definitions (PreferenceAdminController)
  - name: 'Admin: User Preferences'
    description: CRUD management of per-user preference values (UserPreferenceAdminController)
  - name: 'Admin: JSON Blobs'
    description: CRUD management of JsonBlob records (JsonBlobAdminController)
  - name: 'Admin: Monitors'
    description: CRUD management of Monitor definitions (MonitorAdminController)
  - name: 'Admin: Log Levels'
    description: CRUD management of LogLevel overrides (LogLevelAdminController)

  # Admin non-REST endpoints
  - name: 'Admin: Alert Banners'
    description: Alert banner management (AlertBannerAdminController)
  - name: 'Admin: Clients'
    description: Connected WebSocket client management (ClientAdminController)
  - name: 'Admin: Roles'
    description: Role management via DefaultRoleService (RoleAdminController)
  - name: 'Admin: Users'
    description: User listing and role lookups (UserAdminController)
  - name: 'Admin: Track Logs'
    description: Activity tracking log queries (TrackLogAdminController)
  - name: 'Admin: Monitor Results'
    description: Monitor execution results (MonitorResultsAdminController)
  - name: 'Admin: Diff'
    description: Cross-environment config/pref/blob diff and sync (ConfigDiff, PrefDiff, JsonBlobDiff)
  - name: 'Admin: JSON Search'
    description: JSONPath search across configs, blobs, and prefs (JsonSearchController)

  # Admin cluster endpoints
  - name: 'Admin: Cluster'
    description: Cluster instance management (ClusterAdminController)
  - name: 'Admin: Cluster Objects'
    description: Cluster objects report and Hibernate cache management (ClusterObjectsAdminController)
  - name: 'Admin: Services'
    description: Service listing, stats, and cache clearing (ServiceManagerAdminController)
  - name: 'Admin: Environment'
    description: Per-instance environment properties (EnvAdminController)
  - name: 'Admin: Logs'
    description: Log file viewing, download, and management (LogViewerAdminController)
  - name: 'Admin: Memory'
    description: Memory monitoring and heap dumps (MemoryMonitorAdminController)
  - name: 'Admin: Connection Pool'
    description: Database connection pool monitoring (ConnectionPoolMonitorAdminController)
  - name: 'Admin: WebSocket'
    description: Per-instance WebSocket channel management (WebSocketAdminController)

components:
  schemas:
    # ── Error response ──
    Error:
      type: object
      properties:
        name:
          type: string
          description: Exception class name
          example: NotFoundException
        message:
          type: string
          description: Human-readable error message
          example: Resource not found
        cause:
          type: string
          description: Root cause message (omitted if null)
        isRoutine:
          type: boolean
          description: Present and true for expected/routine errors (logged at DEBUG)

    # ── Domain models ──
    AppConfig:
      type: object
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
        value:
          type: string
        valueType:
          type: string
          enum: [string, int, long, double, bool, json, pwd]
        note:
          type: string
        clientVisible:
          type: boolean
        groupName:
          type: string
        lastUpdatedBy:
          type: string
        lastUpdated:
          type: string
          format: date-time

    JsonBlob:
      type: object
      properties:
        id:
          type: integer
          format: int64
        token:
          type: string
          description: Unique access token (UUID-based)
        type:
          type: string
        owner:
          type: string
        acl:
          type: string
        name:
          type: string
        value:
          type: string
          description: JSON string content
        meta:
          type: string
        description:
          type: string
        dateCreated:
          type: string
          format: date-time
        lastUpdated:
          type: string
          format: date-time
        lastUpdatedBy:
          type: string
        archivedDate:
          type: integer
          format: int64
          description: Epoch millis; 0 if not archived

    JsonBlobClientFormat:
      type: object
      description: Client-facing format returned by JsonBlobService
      properties:
        token:
          type: string
        type:
          type: string
        owner:
          type: string
        name:
          type: string
        value:
          type: string
        meta:
          type: string
        description:
          type: string
        dateCreated:
          type: string
          format: date-time
        lastUpdated:
          type: string
          format: date-time
        lastUpdatedBy:
          type: string
        archived:
          type: boolean

    LogLevel:
      type: object
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
          description: Logger name
        level:
          type: string
          enum: [Trace, Debug, Info, Warn, Error, Inherit, 'Off']
          nullable: true
        lastUpdated:
          type: string
          format: date-time
        lastUpdatedBy:
          type: string

    Monitor:
      type: object
      properties:
        id:
          type: integer
          format: int64
        code:
          type: string
        name:
          type: string
        metricType:
          type: string
        metricUnit:
          type: string
        warnThreshold:
          type: integer
        failThreshold:
          type: integer
        params:
          type: string
          description: JSON string of monitor parameters
        notes:
          type: string
        sortOrder:
          type: integer
        active:
          type: boolean
        primaryOnly:
          type: boolean
        lastUpdatedBy:
          type: string
        lastUpdated:
          type: string
          format: date-time

    Preference:
      type: object
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
        type:
          type: string
          enum: [string, int, long, double, bool, json]
        defaultValue:
          type: string
        notes:
          type: string
        groupName:
          type: string
        lastUpdatedBy:
          type: string
        lastUpdated:
          type: string
          format: date-time

    UserPreference:
      type: object
      properties:
        id:
          type: integer
          format: int64
        username:
          type: string
        userValue:
          type: string
        preference:
          $ref: '#/components/schemas/Preference'
        lastUpdatedBy:
          type: string
        lastUpdated:
          type: string
          format: date-time

    TrackLog:
      type: object
      properties:
        id:
          type: integer
          format: int64
        username:
          type: string
        impersonating:
          type: string
        dateCreated:
          type: string
          format: date-time
        category:
          type: string
        msg:
          type: string
        data:
          type: string
        elapsed:
          type: integer
        severity:
          type: string
        correlationId:
          type: string
        loadId:
          type: string
        tabId:
          type: string
        instance:
          type: string
        clientAppCode:
          type: string
        browser:
          type: string
        device:
          type: string
        userAgent:
          type: string
        appVersion:
          type: string
        appEnvironment:
          type: string
        url:
          type: string

    # ── Reusable response wrappers ──
    RestDataListResponse:
      type: object
      properties:
        data:
          type: array
          items:
            type: object

    RestDataObjectResponse:
      type: object
      properties:
        data:
          type: object

    BulkResultResponse:
      type: object
      properties:
        success:
          type: integer
          description: Number of successfully processed records
        fail:
          type: integer
          description: Number of failed records

    ClusterResponse:
      type: object
      description: Response from a cluster-delegated operation
      properties:
        instance:
          type: string
        value:
          type: object
        exception:
          type: string
          nullable: true

  parameters:
    instanceParam:
      name: instance
      in: query
      description: Target cluster instance name
      required: true
      schema:
        type: string
    optionalInstanceParam:
      name: instance
      in: query
      description: Target cluster instance name (omit to target all instances)
      required: false
      schema:
        type: string
    clientUsernameParam:
      name: clientUsername
      in: query
      description: Client-reported username for session match validation
      required: true
      schema:
        type: string

  responses:
    NoContent:
      description: Success (no content)
    Unauthorized:
      description: Not authenticated
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Forbidden:
      description: Insufficient role/permissions
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    NotFound:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    ServerError:
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'

  securitySchemes:
    sessionAuth:
      type: apiKey
      in: cookie
      name: JSESSIONID
      description: Session-based authentication managed by BaseAuthenticationService

security:
  - sessionAuth: []

paths:

  # ╔══════════════════════════════════════════════════════════════════╗
  # ║  CORE ENDPOINTS — XhController (/xh/*)                         ║
  # ║  Class-level: @AccessAll (any authenticated user)               ║
  # ╚══════════════════════════════════════════════════════════════════╝

  # ── Auth ──

  /xh/authConfig:
    get:
      tags: [Auth]
      summary: Get auth configuration for client bootstrap
      description: |
        **Whitelisted** (pre-auth) — returns authentication-related settings
        needed by the client app during bootstrap (e.g. OAuth URLs, auth type).
      security: []
      operationId: xh.authConfig
      responses:
        '200':
          description: Auth configuration object
          content:
            application/json:
              schema:
                type: object
                description: Auth config shape depends on app's BaseAuthenticationService implementation

  /xh/authStatus:
    get:
      tags: [Auth]
      summary: Get current authentication status
      description: Returns whether the current session is authenticated and the user's identity.
      operationId: xh.authStatus
      responses:
        '200':
          description: Authentication status
          content:
            application/json:
              schema:
                type: object
                properties:
                  authenticated:
                    type: boolean
                  identity:
                    type: object
                    nullable: true
                    description: User identity from IdentityService (null if not authenticated)

  /xh/getIdentity:
    get:
      tags: [Auth]
      summary: Get current user identity
      operationId: xh.getIdentity
      responses:
        '200':
          description: User identity object from IdentityService
          content:
            application/json:
              schema:
                type: object
        '401':
          $ref: '#/components/responses/Unauthorized'

  /xh/login:
    get:
      tags: [Auth]
      summary: Login with username and password
      description: |
        **Whitelisted** (pre-auth). Authenticates a user with credentials.
        Returns success status and identity on successful login.
      security: []
      operationId: xh.login
      parameters:
        - name: username
          in: query
          required: true
          schema:
            type: string
        - name: password
          in: query
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Login result
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  identity:
                    type: object
                    nullable: true

  /xh/logout:
    get:
      tags: [Auth]
      summary: Logout current user
      description: '**Whitelisted** (pre-auth). Ends the current user session.'
      security: []
      operationId: xh.logout
      responses:
        '200':
          description: Logout result
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean

  /xh/impersonationTargets:
    get:
      tags: [Auth]
      summary: List available impersonation targets
      description: Returns users available for impersonation by the current auth user. Protected internally by IdentityService.
      operationId: xh.impersonationTargets
      responses:
        '200':
          description: List of impersonation targets
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    username:
                      type: string

  /xh/impersonate:
    get:
      tags: [Auth]
      summary: Start impersonating a user
      description: Protected internally by IdentityService (requires HOIST_IMPERSONATOR role).
      operationId: xh.impersonate
      parameters:
        - name: username
          in: query
          required: true
          schema:
            type: string
      responses:
        '204':
          $ref: '#/components/responses/NoContent'
        '403':
          $ref: '#/components/responses/Forbidden'

  /xh/endImpersonate:
    get:
      tags: [Auth]
      summary: End impersonation session
      operationId: xh.endImpersonate
      responses:
        '204':
          $ref: '#/components/responses/NoContent'

  # ── Config ──

  /xh/getConfig:
    get:
      tags: [Config]
      summary: Get client-visible configuration
      description: Returns all AppConfig entries marked `clientVisible=true` as a key-value map.
      operationId: xh.getConfig
      responses:
        '200':
          description: Client config map
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true

  # ── Preferences ──

  /xh/getPrefs:
    get:
      tags: [Preferences]
      summary: Get user preferences
      description: Returns all preference values for the current user.
      operationId: xh.getPrefs
      parameters:
        - $ref: '#/components/parameters/clientUsernameParam'
      responses:
        '200':
          description: User preferences map
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true

  /xh/setPrefs:
    post:
      tags: [Preferences]
      summary: Set user preferences
      description: Sets one or more preference values for the current user. Returns updated preferences.
      operationId: xh.setPrefs
      parameters:
        - $ref: '#/components/parameters/clientUsernameParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              additionalProperties: true
              description: Key-value map of preference names to values
      responses:
        '200':
          description: Updated preferences
          content:
            application/json:
              schema:
                type: object
                properties:
                  preferences:
                    type: object
                    additionalProperties: true

  /xh/clearUserState:
    post:
      tags: [Preferences]
      summary: Clear all user preferences and view state
      description: Removes all user preferences and ViewManager state for the current user.
      operationId: xh.clearUserState
      parameters:
        - $ref: '#/components/parameters/clientUsernameParam'
      responses:
        '204':
          $ref: '#/components/responses/NoContent'

  # ── JSON Blobs ──

  /xh/getJsonBlob:
    get:
      tags: [JSON Blobs]
      summary: Get a JSON blob by token
      operationId: xh.getJsonBlob
      parameters:
        - name: token
          in: query
          required: true
          schema:
            type: string
      responses:
        '200':
          description: JSON blob in client format
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JsonBlobClientFormat'
        '404':
          $ref: '#/components/responses/NotFound'

  /xh/findJsonBlob:
    get:
      tags: [JSON Blobs]
      summary: Find a JSON blob by type, name, and owner
      operationId: xh.findJsonBlob
      parameters:
        - name: type
          in: query
          required: true
          schema:
            type: string
        - name: name
          in: query
          required: true
          schema:
            type: string
        - name: owner
          in: query
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Matching JSON blob (or null)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JsonBlobClientFormat'

  /xh/listJsonBlobs:
    get:
      tags: [JSON Blobs]
      summary: List JSON blobs by type
      operationId: xh.listJsonBlobs
      parameters:
        - name: type
          in: query
          required: true
          schema:
            type: string
        - name: includeValue
          in: query
          required: false
          schema:
            type: boolean
            default: false
      responses:
        '200':
          description: List of JSON blobs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/JsonBlobClientFormat'

  /xh/createJsonBlob:
    post:
      tags: [JSON Blobs]
      summary: Create a new JSON blob
      operationId: xh.createJsonBlob
      parameters:
        - name: data
          in: query
          required: true
          description: JSON-encoded string of blob properties
          schema:
            type: string
      responses:
        '200':
          description: Created JSON blob
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JsonBlobClientFormat'

  /xh/updateJsonBlob:
    post:
      tags: [JSON Blobs]
      summary: Update an existing JSON blob
      operationId: xh.updateJsonBlob
      parameters:
        - name: token
          in: query
          required: true
          schema:
            type: string
        - name: update
          in: query
          required: true
          description: JSON-encoded string of fields to update
          schema:
            type: string
      responses:
        '200':
          description: Updated JSON blob
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JsonBlobClientFormat'

  /xh/createOrUpdateJsonBlob:
    post:
      tags: [JSON Blobs]
      summary: Create or update a JSON blob by type and name
      operationId: xh.createOrUpdateJsonBlob
      parameters:
        - name: type
          in: query
          required: true
          schema:
            type: string
        - name: name
          in: query
          required: true
          schema:
            type: string
        - name: update
          in: query
          required: true
          description: JSON-encoded string of fields to set
          schema:
            type: string
      responses:
        '200':
          description: Created or updated JSON blob
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JsonBlobClientFormat'

  /xh/archiveJsonBlob:
    post:
      tags: [JSON Blobs]
      summary: Archive a JSON blob
      operationId: xh.archiveJsonBlob
      parameters:
        - name: token
          in: query
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Archived JSON blob
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/JsonBlobClientFormat'

  # ── Tracking ──

  /xh/track:
    post:
      tags: [Tracking]
      summary: Submit activity tracking entries
      description: Submits one or more client-side tracking entries. Input is OWASP-encoded.
      operationId: xh.track
      parameters:
        - $ref: '#/components/parameters/clientUsernameParam'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [entries]
              properties:
                entries:
                  type: array
                  items:
                    type: object
                    properties:
                      msg:
                        type: string
                      category:
                        type: string
                      data:
                        type: object
                      elapsed:
                        type: integer
                      severity:
                        type: string
      responses:
        '204':
          $ref: '#/components/responses/NoContent'

  # ── Environment & Health ──

  /xh/environment:
    get:
      tags: [Environment]
      summary: Get application environment info
      operationId: xh.environment
      responses:
        '200':
          description: Environment details
          content:
            application/json:
              schema:
                type: object

  /xh/environmentPoll:
    get:
      tags: [Environment]
      summary: Poll environment status
      description: Lightweight polling endpoint for environment/session status updates.
      operationId: xh.environmentPoll
      responses:
        '200':
          description: Environment poll data
          content:
            application/json:
              schema:
                type: object

  /xh/ping:
    get:
      tags: [Environment]
      summary: Health check ping
      description: |
        **Whitelisted** (pre-auth). Minimal health check returning app code and timestamp.
        Also reachable via legacy `/ping` alias.
      security: []
      operationId: xh.ping
      responses:
        '200':
          description: Ping response
          content:
            application/json:
              schema:
                type: object
                properties:
                  appCode:
                    type: string
                  timestamp:
                    type: integer
                    format: int64
                  success:
                    type: boolean

  /ping:
    get:
      tags: [Environment]
      summary: Legacy health check alias
      description: '**Whitelisted** (pre-auth). Legacy alias for `/xh/ping`.'
      security: []
      operationId: ping
      responses:
        '200':
          description: Ping response
          content:
            application/json:
              schema:
                type: object
                properties:
                  appCode:
                    type: string
                  timestamp:
                    type: integer
                    format: int64
                  success:
                    type: boolean

  /xh/version:
    get:
      tags: [Environment]
      summary: Get application version info
      description: '**Whitelisted** (pre-auth). Returns app code, version, and build info.'
      security: []
      operationId: xh.version
      responses:
        '200':
          description: Version info
          content:
            application/json:
              schema:
                type: object
                properties:
                  appCode:
                    type: string
                  appVersion:
                    type: string
                  appBuild:
                    type: string

  /xh/getTimeZoneOffset:
    get:
      tags: [Environment]
      summary: Get timezone offset
      description: Returns the UTC offset in milliseconds for a given timezone ID.
      operationId: xh.getTimeZoneOffset
      parameters:
        - name: timeZoneId
          in: query
          required: true
          description: 'Fully qualified timezone ID (e.g. "America/New_York", "Europe/London")'
          schema:
            type: string
      responses:
        '200':
          description: Timezone offset
          content:
            application/json:
              schema:
                type: object
                properties:
                  offset:
                    type: integer
                    description: Offset from UTC in milliseconds
        '404':
          $ref: '#/components/responses/NotFound'

  /xh/echoHeaders:
    get:
      tags: [Environment]
      summary: Echo request headers
      description: Returns all HTTP headers received on the request as key-value pairs. Useful for debugging ingress/load balancer header passthrough.
      operationId: xh.echoHeaders
      responses:
        '200':
          description: Map of header names to values
          content:
            application/json:
              schema:
                type: object
                additionalProperties:
                  type: string

  # ── Export ──

  /xh/export:
    post:
      tags: [Export]
      summary: Export grid data
      description: Accepts grid export parameters as multipart form data and returns the exported file (Excel, CSV, etc.).
      operationId: xh.export
      requestBody:
        required: true
        content:
