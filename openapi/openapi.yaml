  # ╔══════════════════════════════════════════════════════════════════╗
  # ║  PROXY — ProxyImplController (/proxy/*)                        ║
  # ║  Class-level: @AccessAll                                        ║
  # ╚══════════════════════════════════════════════════════════════════╝

  /proxy/{name}/{url}:
    get:
      tags: [Proxy]
      summary: Proxy a request to a named proxy service
      description: |
        Forwards requests to a `BaseProxyService` registered as `{name}Service`.
        Supports all HTTP methods. The proxy service handles authentication
        and request/response transformation.
      operationId: proxy.forward
      parameters:
        - name: name
          in: path
          required: true
          description: Proxy service name (maps to `{name}Service` Spring bean)
          schema:
            type: string
        - name: url
          in: path
          required: true
          description: Target URL path to forward to
          schema:
            type: string
      responses:
        '200':
          description: Proxied response (format depends on target service)
        '500':
          $ref: '#/components/responses/ServerError'

