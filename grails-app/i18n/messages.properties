# Hoist-core message bundle — merged with the host app's bundle by Grails.
# Validator error codes used by hoist-core domain classes.

# AppConfig: typed-config population failure. {3}=typed class name, {4}=cause message.
# Intentionally omits {2} (the large field value)
default.invalid.typedConfig.message=Cannot apply value to {3}: {4}
